<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧚 Fairy Runner - Magic Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0520; 
            color: #fff; 
            font-family: 'VT323', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ===== ROYAL THEME STYLES ===== */
        .royal-mode .vegas-nav {
            border-bottom: 2px solid #f1c40f !important;
            box-shadow: 0 4px 25px rgba(241, 196, 15, 0.4), inset 0 -1px 5px rgba(255, 255, 255, 0.2) !important;
            background: linear-gradient(180deg, #1a0a2e, #2c0b4d) !important;
        }
        .royal-crown-icon {
            position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
            font-size: 18px; animation: crownFloat 2s ease-in-out infinite;
            pointer-events: none; z-index: 2005;
        }
        @keyframes crownFloat { 0%, 100% { transform: translateX(-50%) translateY(0) rotate(-5deg); } 50% { transform: translateX(-50%) translateY(-5px) rotate(5deg); } }
        .royal-name { color: #f1c40f !important; text-shadow: 0 0 10px #f1c40f !important; font-weight: bold; position: relative; display: inline-block; }

        /* ===== NAVBAR ===== */
        .vegas-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 999;
            display: flex; justify-content: flex-start; align-items: center;
            padding: 0 10px;
            background: linear-gradient(180deg, #0d0520, #1a0a2e);
            border-bottom: 2px solid #cc4400;
            box-shadow: 0 4px 20px rgba(204,68,0,.25), inset 0 -1px 0 rgba(254,202,87,.1);
            height: 60px;
        }
        .nav-welcome {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .nav-coins {
            margin-left: auto; display: flex; align-items: center; gap: 6px;
            padding: 5px 14px; text-decoration: none;
            background: rgba(254,202,87,.08); border: 1px solid rgba(254,202,87,.2);
            border-radius: 20px; transition: all .3s; pointer-events: auto;
        }
        .nav-coins:hover {
            background: rgba(254,202,87,.15); border-color: rgba(254,202,87,.4);
            box-shadow: 0 0 12px rgba(254,202,87,.2);
        }
        .nav-coin-icon {
            font-size: 16px; animation: coinSpin 3s ease-in-out infinite;
        }
        @keyframes coinSpin {
            0%,100% { transform: rotateY(0) }
            50% { transform: rotateY(180deg) }
        }
        .nav-coin-amt {
            font-family: 'Press Start 2P', monospace; font-size: 10px;
            color: #feca57; text-shadow: 0 0 6px rgba(254,202,87,.3);
        }
        .nav-coin-label {
            font-family: 'VT323', monospace; font-size: 12px;
            color: #ff9ff3; opacity: .7;
        }
        .nav-welcome-text {
            display: inline-block;
            font-family: 'Pacifico', cursive; font-size: 18px;
            color: #feca57; white-space: nowrap;
            text-shadow: 0 0 10px #feca57, 0 0 25px rgba(254,202,87,.4), 0 0 50px rgba(255,159,243,.15);
            letter-spacing: 1px;
        }

        .nav-items { display: flex; align-items: center; }
        .nav-link { 
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; 
            padding: 8px 15px; text-decoration: none; border-left: 1px solid rgba(254,202,87,0.05); transition: all 0.3s;
            min-width: 80px; height: 100%;
        }
        .nav-link:hover { background: rgba(254,202,87,0.08); }
        .nav-emoji { font-size: 20px; line-height: 1; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
        .nav-text { 
            font-family: 'Press Start 2P', monospace; font-size: 7px; color: #48dbfb; 
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* DROPDOWN */
        .nav-item-dropdown { position: relative; height: 100%; display: flex; align-items: center; }
        .dropdown-menu {
            position: absolute; top: 100%; left: 0; min-width: 200px;
            background: rgba(13, 5, 32, 0.98); border: 2px solid #feca57;
            border-top: none; display: none; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border-radius: 0 0 10px 10px;
            z-index: 10000;
        }
        .nav-item-dropdown::after { content: ''; position: absolute; top: 100%; left: 0; width: 100%; height: 20px; }
        .nav-item-dropdown:hover .dropdown-menu { display: flex; }
        .dropdown-link {
            padding: 15px; text-decoration: none; color: #48dbfb;
            font-family: 'Press Start 2P', monospace; font-size: 8px;
            display: flex !important; align-items: center; gap: 12px; transition: 0.3s;
            border-bottom: 1px solid rgba(254, 202, 87, 0.1);
        }
        .dropdown-link:hover { background: rgba(72, 219, 251, 0.15); color: #fff; }
        .dropdown-emoji { font-size: 18px; }

        /* ===== GAME CONTAINER ===== */
        #gameWrapper {
            flex: 1;
            position: relative;
            background: linear-gradient(to bottom, #0a0520 0%, #1a0a2e 100%);
            overflow: hidden;
            cursor: pointer;
        }
        canvas { display: block; width: 100%; height: 100%; }

        #ui-overlay {
            position: absolute; inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .game-stats {
            position: absolute; top: 20px; left: 20px;
            font-family: 'Press Start 2P', monospace; font-size: 14px;
            color: #48dbfb; text-shadow: 0 0 10px #48dbfb;
            text-align: left;
        }

        .screen {
            background: rgba(10, 5, 32, 0.9);
            border: 3px solid #feca57;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            pointer-events: auto;
            box-shadow: 0 0 50px rgba(254, 202, 87, 0.3);
            max-width: 400px;
        }

        h1 { font-family: 'Press Start 2P', monospace; font-size: 20px; color: #feca57; margin-bottom: 20px; }
        p { font-size: 24px; margin-bottom: 20px; color: #e8d5f5; }
        .btn {
            background: #e94560; color: #fff; border: none;
            padding: 15px 30px; font-family: 'Press Start 2P', monospace;
            font-size: 14px; cursor: pointer; border-radius: 8px;
            box-shadow: 0 5px 0 #8a2e3f; transition: 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #8a2e3f; }

        #startScreen { display: block; }
        #gameOverScreen { display: none; }

        /* Mobile Fix */
        @media (max-width: 768px) {
            .nav-text { display: none; }
            h1 { font-size: 16px; }
            .game-stats { font-size: 10px; }
        }
    </style>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <nav class="vegas-nav">
        <div class="nav-items">
            <a href="birthday.html" class="nav-link"><span class="nav-emoji">🏠</span><span class="nav-text">HOME</span></a>
            <a href="slot.html" class="nav-link"><span class="nav-emoji">🎰</span><span class="nav-text">SLOT</span></a>
            <div class="nav-item-dropdown">
                <a href="javascript:void(0)" class="nav-link"><span class="nav-emoji">🕹️</span><span class="nav-text">ARCADE ▼</span></a>
                <div class="dropdown-menu">
                    <a href="blackjack.html" class="dropdown-link"><span class="dropdown-emoji">🃏</span><span>BLACKJACK</span></a>
                    <a href="runner.html" class="dropdown-link"><span class="dropdown-emoji">🧚</span><span>RUNNER</span></a>
                    <a href="fortune.html" class="dropdown-link"><span class="dropdown-emoji">🔮</span><span>PERAMAL</span></a>
                    <a href="fact.html" class="dropdown-link"><span class="dropdown-emoji">💡</span><span>FAKTA WOW</span></a>
                </div>
            </div>
            <a href="shop.html" class="nav-link"><span class="nav-emoji">🛒</span><span class="nav-text">TOKO</span></a>
            <a href="history.html" class="nav-link"><span class="nav-emoji">📜</span><span class="nav-text">SEJARAH</span></a>
            <a href="letters.html" class="nav-link"><span class="nav-emoji">📩</span><span class="nav-text">SURAT</span></a>
        </div>
        <div class="nav-welcome"><span class="nav-welcome-text" id="navWelcomeText">✨ Welcome Nanaz!!! 💖</span></div>
        <a href="slot.html" class="nav-coins">
            <span class="nav-coin-icon">🪙</span>
            <span class="nav-coin-amt" id="navCoinDisplay">0</span>
            <span class="nav-coin-label">KOIN</span>
        </a>
    </nav>

    <div id="gameWrapper">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-overlay">
            <div class="game-stats" id="gameStats" style="display:none">
                SCORE: <span id="score">0</span><br>
                COINS: <span id="earned">0</span>
            </div>

            <div id="startScreen" class="screen">
                <h1>🧚 FAIRY RUNNER</h1>
                <p>Klik untuk terbang!<br>Kumpulkan bintang untuk dapat koin.<br>Hindari awan gelap!</p>
                <button class="btn" onclick="startGame()">MULAI TERBANG</button>
            </div>

            <div id="gameOverScreen" class="screen">
                <h1 style="color:#e94560">GAME OVER</h1>
                <p>Jarak: <span id="finalScore">0</span>m<br>Koin didapat: <span id="finalEarned">0</span> 🪙</p>
                <button class="btn" onclick="startGame()">MAIN LAGI</button>
            </div>
        </div>
    </div>

    <script src="magic_global.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameWrapper = document.getElementById('gameWrapper');
        
        let width, height;
        let fairy, obstacles, stars, particles;
        let score, earned, gameActive = false;
        let frame = 0;
        let bgOffset = 0;

        const run_bgm = new Audio('bgm-slot.mp3');
        run_bgm.loop = true;
        run_bgm.volume = 0.3;

        function resize() {
            width = canvas.width = gameWrapper.clientWidth;
            height = canvas.height = gameWrapper.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Fairy {
            constructor() {
                this.x = 80;
                this.y = height / 2;
                this.v = 0;
                this.radius = 15;
                this.targetY = this.y;
            }
            update() {
                this.v += 0.4; // gravity
                this.y += this.v;
                if (this.y < 0) this.y = 0, this.v = 0;
                if (this.y > height) endGame();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Glow
                const grd = ctx.createRadialGradient(0,0,0,0,0,30);
                grd.addColorStop(0, 'rgba(255, 255, 255, 0.5)');
                grd.addColorStop(1, 'transparent');
                ctx.fillStyle = grd;
                ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2); ctx.fill();

                // Fairy (emoji)
                ctx.font = '30px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🧚', 0, 0);
                ctx.restore();
            }
            flap() {
                this.v = -7;
                spawnParticles(this.x, this.y, '#ff9ff3', 3);
                if (window.playSFX) window.playSFX([300, 400], 'sine', 0.05, 0.05);
            }
        }

        class Obstacle {
            constructor() {
                this.x = width + 50;
                this.gap = 180 + Math.random() * 100;
                this.top = 50 + Math.random() * (height - this.gap - 100);
                this.width = 60;
                this.passed = false;
            }
            update() {
                this.x -= 4 + (score / 1000);
            }
            draw() {
                ctx.fillStyle = '#1a0a2e';
                ctx.strokeStyle = '#48dbfb';
                ctx.lineWidth = 3;
                
                // Top
                ctx.fillRect(this.x, 0, this.width, this.top);
                ctx.strokeRect(this.x, 0, this.width, this.top);
                
                // Bottom
                ctx.fillRect(this.x, this.top + this.gap, this.width, height - (this.top + this.gap));
                ctx.strokeRect(this.x, this.top + this.gap, this.width, height - (this.top + this.gap));
                
                // Awan hiasan
                ctx.font = '40px serif';
                ctx.fillText('☁️', this.x - 10, this.top - 20);
                ctx.fillText('☁️', this.x - 10, this.top + this.gap + 20);
            }
        }

        class Star {
            constructor() {
                this.x = width + 50;
                this.y = 50 + Math.random() * (height - 100);
                this.v = 3 + Math.random() * 2;
                this.collected = false;
            }
            update() { this.x -= this.v; }
            draw() {
                ctx.font = '20px serif';
                ctx.fillText('⭐', this.x, this.y);
            }
        }

        function spawnParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x, y, 
                    vx: Math.random() * 4 - 2, 
                    vy: Math.random() * 4 - 2,
                    life: 1,
                    color
                });
            }
        }

        function startGame() {
            fairy = new Fairy();
            obstacles = [];
            stars = [];
            particles = [];
            score = 0;
            earned = 0;
            gameActive = true;
            frame = 0;
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('gameStats').style.display = 'block';
            
            if (run_bgm.paused) run_bgm.play().catch(()=>{});
            if (window.playSFX) window.playSFX([400, 600, 800], 'sine', 0.1, 0.3);
            
            loop();
        }

        function endGame() {
            gameActive = false;
            run_bgm.pause();
            if (window.playSFX) window.playSFX([200, 100], 'sawtooth', 0.2, 0.5);
            
            document.getElementById('gameOverScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = Math.floor(score/10);
            document.getElementById('finalEarned').textContent = earned;
            
            // SAVE COINS
            const current = parseInt(localStorage.getItem('slotCoins') || '0');
            localStorage.setItem('slotCoins', current + earned);
            if (window.refreshMagicUI) window.refreshMagicUI();
        }

        function loop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, width, height);
            
            // Parallax BG
            bgOffset -= 0.5;
            ctx.fillStyle = '#1a0a2e';
            for(let i=0; i<width; i+=100) {
                const h = 50 + Math.sin((i + bgOffset)/100) * 20;
                ctx.fillRect(i, height-h, 100, h);
            }

            fairy.update();
            fairy.draw();

            if (frame % 100 === 0) obstacles.push(new Obstacle());
            if (frame % 60 === 0) stars.push(new Star());

            obstacles.forEach((ob, index) => {
                ob.update();
                ob.draw();
                
                // Collision
                if (fairy.x + 10 > ob.x && fairy.x - 10 < ob.x + ob.width) {
                    if (fairy.y - 10 < ob.top || fairy.y + 10 > ob.top + ob.gap) {
                        endGame();
                    }
                }
                
                if (ob.x + ob.width < fairy.x && !ob.passed) {
                    ob.passed = true;
                    score += 100;
                }
                if (ob.x < -100) obstacles.splice(index, 1);
            });

            stars.forEach((s, index) => {
                s.update();
                s.draw();
                const dist = Math.hypot(fairy.x - s.x, fairy.y - s.y);
                if (dist < 30) {
                    stars.splice(index, 1);
                    earned += 1;
                    spawnParticles(s.x, s.y, '#feca57', 10);
                    if (window.playSFX) window.playSFX([800, 1200], 'sine', 0.1, 0.1);
                }
                if (s.x < -50) stars.splice(index, 1);
            });

            particles.forEach((p, index) => {
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(index, 1);
                else {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                    ctx.globalAlpha = 1;
                }
            });

            score++;
            document.getElementById('score').textContent = Math.floor(score/10);
            document.getElementById('earned').textContent = earned;
            
            frame++;
            requestAnimationFrame(loop);
        }

        gameWrapper.addEventListener('click', () => {
            if (gameActive) fairy.flap();
        });
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameActive) fairy.flap();
                else if (document.getElementById('startScreen').style.display !== 'none' || document.getElementById('gameOverScreen').style.display !== 'none') {
                    startGame();
                }
            }
        });

        // Update coin display
        setInterval(() => {
            const coins = localStorage.getItem('slotCoins') || '0';
            const el = document.getElementById('navCoinDisplay');
            if (el) el.textContent = coins;
        }, 1000);
    </script>
</body>
</html>
